<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>EURO DIESEL | Player de Vídeos</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap');

        body { 
            margin: 0; padding: 20px; 
            background: #050505; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; justify-content: center; 
            color: #ffffff; min-height: 100vh;
            background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 2px);
            background-size: 50px 50px;
        }

        .container { 
            max-width: 420px; width: 100%; 
            background: #000000; border-radius: 40px; 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.9), 0 0 20px rgba(227, 30, 36, 0.15); 
            border: 1px solid #1a1a1a;
        }

        .header { 
            background: linear-gradient(180deg, #121212 0%, #000000 100%); 
            padding: 30px 15px; text-align: center; 
            border-bottom: 3px solid #e31e24; 
        }

        .brand { 
            font-size: 32px; font-weight: 900; letter-spacing: 2px; 
            margin: 0; text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, #e1e1e1 45%, #777 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .content { padding: 0; }

        /* Container do Vídeo Responsivo */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
            overflow: hidden;
            background-color: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-button {
            display: block;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            background: #111;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            border-top: 1px solid #222;
            transition: 0.3s;
        }
        
        .back-button:hover { background: #e31e24; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="brand">EURO DIESEL</h1>
    </div>

    <div class="content">
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/videoseries?list=SEU_ID_DA_PLAYLIST_AQUI&autoplay=1&mute=1&loop=1" 
                allow="autoplay; fullscreen"
                allowfullscreen>
            </iframe>
        </div>
        
        <a href="index.html" class="back-button">← Voltar para Menu</a>
    </div>
</div>

</body>
</html>
