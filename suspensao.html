<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suspensão a Ar | Euro Diesel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;900&display=swap');

        body { 
            margin: 0; padding: 20px; 
            background: #020202; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; justify-content: center; 
            color: #ffffff; min-height: 100vh;
        }

        .container { 
            max-width: 420px; width: 100%; 
            background: #000000; border-radius: 50px; 
            overflow: hidden; position: relative;
            border: 1px solid #1a1a1a;
        }
        
        .header { 
            background: linear-gradient(135deg, #0f0f0f 0%, #000000 100%); 
            padding: 40px 20px; text-align: center; 
            position: sticky; top: 0; z-index: 100; 
            border-bottom: 1px solid rgba(227, 30, 36, 0.3);
            border-radius: 0 0 50px 50px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.95);
        }

        .brand { 
            font-size: 22px; font-weight: 900; letter-spacing: 8px; 
            color: #ffffff; text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a1 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .content { padding: 40px 25px; margin-top: -20px; }

        .video-card {
            background: #0a0a0a;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            margin-bottom: 30px;
        }

        .video-card video {
            width: 100%;
            display: block;
        }

        .video-info {
            padding: 20px;
        }

        .video-title {
            font-weight: 700; font-size: 14px;
            text-transform: uppercase; color: #e31e24;
            letter-spacing: 2px; margin-bottom: 8px;
        }

        .video-desc {
            font-size: 11px; color: #888; line-height: 1.6;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: #555;
            text-decoration: none;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-back:hover { color: #e31e24; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="btn-back">← Voltar</a>
        <h1 class="brand">Suspensão a Ar</h1>
    </div>

    <div class="content">
        <div class="video-card">
            <video controls>
                <source src="AR.mp4" type="video/mp4">
                Seu navegador não suporta vídeos.
            </video>
            <div class="video-info">
                <div class="video-title">Análise Técnica</div>
                <div class="video-desc">Desmontagem e inspeção detalhada dos componentes das válvulas de suspensão.</div>
            </div>
        </div>

        <div class="video-card">
            <video controls>
                <source src="AR1.mp4" type="video/mp4">
                Seu navegador não suporta vídeos.
            </video>
            <div class="video-info">
                <div class="video-title">Teste de Estanqueidade</div>
                <div class="video-desc">Validação pneumática e teste de pressão para garantir zero vazamentos no sistema.</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
