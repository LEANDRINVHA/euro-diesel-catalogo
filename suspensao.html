<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DIESEL | Suspensão</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: white; }
        .video-container { width: 100%; max-width: 420px; }
        video { width: 100%; height: auto; }
        .back-button { margin-top: 20px; padding: 15px 30px; background: #e31e24; color: white; text-decoration: none; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="myVideo" autoplay muted playsinline controls>
            <source src="AR1.mp4" type="video/mp4">
            Seu navegador não suporta o vídeo.
        </video>
    </div>

    <a href="index.html" class="back-button">Voltar ao Menu</a>

    <script>
        const video = document.getElementById('myVideo');
        const playlist = ["AR1.mp4", "AR.mp4"];
        let current = 0;

        video.addEventListener('ended', function() {
            current++;
            if (current < playlist.length) {
                video.src = playlist[current];
                video.play();
            }
        });
    </script>
</body>
</html>
