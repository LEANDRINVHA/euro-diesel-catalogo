<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DIESEL | Suspensão a Ar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap');
        body { margin: 0; padding: 20px; background: #050505; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; color: #ffffff; min-height: 100vh; background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 2px); background-size: 50px 50px; }
        .container { max-width: 420px; width: 100%; background: #000000; border-radius: 40px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.9), 0 0 20px rgba(227, 30, 36, 0.15); border: 1px solid #1a1a1a; }
        .header { background: linear-gradient(180deg, #121212 0%, #000000 100%); padding: 30px 15px; text-align: center; border-bottom: 3px solid #e31e24; }
        .brand { font-size: 32px; font-weight: 900; letter-spacing: 2px; margin: 0; text-transform: uppercase; background: linear-gradient(to bottom, #ffffff 0%, #e1e1e1 45%, #777 50%, #ffffff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .content { padding: 0; }
        .video-wrapper { position: relative; background-color: #000; width: 100%; }
        video { width: 100%; height: auto; display: block; }
        .back-button { display: block; padding: 20px; text-align: center; text-decoration: none; color: #fff; background: #111; font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; border-top: 1px solid #222; transition: 0.3s; }
        .back-button:hover { background: #e31e24; }
        .title-video { text-align: center; font-size: 14px; padding: 15px; color: #ccc; font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="brand">EURO DIESEL</h1>
    </div>
    <div class="content">
        <div class="title-video">SISTEMAS PNEUMÁTICOS</div>
        <div class="video-wrapper">
            <video id="player" autoplay muted controls playsinline>
                <source src="AR1.mp4" type="video/mp4">
                Seu navegador não suporta vídeos.
            </video>
        </div>
        <a href="index.html" class="back-button">← Voltar para Menu</a>
    </div>
</div>
<script>
    const playlist = ["AR1.mp4", "AR.mp4"];
    let currentVideo = 0;
    const player = document.getElementById('player');
    player.addEventListener('ended', function() {
        currentVideo++;
        if (currentVideo < playlist.length) {
            player.src = playlist[currentVideo];
            player.play();
        } else {
            currentVideo = 0;
            player.src = playlist[currentVideo];
            player.play();
        }
    });
</script>
</body>
</html>
